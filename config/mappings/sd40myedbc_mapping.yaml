# SD40 - District mapping (auto-generated by Mapping Editor)
# Inherits from: myedbc
_base: myedbc
version: '1.0'
sis: MyEducationBC
district_name: SD40 - New Westminster School District
global_config:
  school_year_sources:
    student_schedule: SD40-StudentSchedule.csv
  # SD40 tracks attendance in MyEd BC via dedicated ATT--* rows.
  # These are SIS-internal bookkeeping (AM/PM/Daily check-ins) and
  # shouldn't surface as separate classes in SpacesEDU.
  # ATT--Daily appears only in ClassInformation (not StudentSchedule)
  # with Primary Teacher=Y in some rows — exclude it to prevent
  # co-teacher enrollment leaks if a future drop has a matching
  # Section Letter or Master Timetable ID.
  excluded_course_codes:
    - ATT--AM
    - ATT--PM
    - ATT--Daily
mappings:
  Students:
    source_files:
      student_demographic: SD-40_StudentDemographic.csv
    field_map:
      Email Address:
        format: '{student number}@newwestschools.ca'
  Staff:
    source_files:
      staff_info: SD-40_StaffInformation.csv
  Family:
    source_files:
      emergency_contacts: SD-40_StudentEmergencyContact.csv
  Classes:
    source_files:
      student_schedule: SD40-StudentSchedule.csv
      course_info: SD-40_CourseInformation.csv
      staff_info: SD-40_StaffInformation.csv
      student_demographic: SD-40_StudentDemographic.csv
      class_info: SD-40_ClassInformation.csv
    headers:
      SD40-StudentSchedule.csv:
      - School Year
      - School Number
      - Student Number
      - PEN
      - Grade
      - Homeroom
      - Course School Number
      - Course Code
      - District Course Code
      - Course Title
      - Short Name
      - Period
      - Day
      - Semester
      - Section Letter
      - Master Timetable ID
      - Teacher ID
      - Teacher Name
      - Primary Teacher
      - Enrolment Status
  Enrollments:
    source_files:
      student_schedule: SD40-StudentSchedule.csv
      student_demographic: SD-40_StudentDemographic.csv
    field_map:
      User ID:
        student_id_col: Student Number
      Role:
        student_id_col: Student Number
    headers:
      SD40-StudentSchedule.csv:
      - School Year
      - School Number
      - Student Number
      - PEN
      - Grade
      - Homeroom
      - Course School Number
      - Course Code
      - District Course Code
      - Course Title
      - Short Name
      - Period
      - Day
      - Semester
      - Section Letter
      - Master Timetable ID
      - Teacher ID
      - Teacher Name
      - Primary Teacher
      - Enrolment Status
