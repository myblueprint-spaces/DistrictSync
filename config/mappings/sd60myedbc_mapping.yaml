# SD60 - Peace River North School District
# Inherits from: myedbc (standard MyEducation BC mapping).
# SD60 is a distributed-learning district aggregating many independent schools.
# Per SD60's 2026-07 clarification (plan 0030):
#   - Student emails are GENERATED as firstlast+2-digit-admission-year@learn60.ca
#     (was: used AS-IS from the file across 70+ domains). This standardizes every
#     active student onto a deterministic learn60 login and fixes the blanks +
#     non-whitelisted domains in one move. NN = admission-year is a KNOWN-IMPERFECT
#     proxy for "year joined the district" (the only join-year field available);
#     ~41% of existing learn60 logins are reproduced exactly, the rest MIGRATED —
#     a deliberate, recorded login-standardization (see DECISIONS 2026-07-14).
#   - "Active No Primary" is DROPPED (was: retained) — online-course-only
#     attachments, not real active enrolments; inherits base ["Active","PreReg"].
#   - Students are rostered under their Home School Number (was: home-school row's
#     per-row School Number).
_base: myedbc
version: '1.0'
sis: MyEducationBC
district_name: SD60 - Peace River North School District

global_config:
  school_year_sources:
    student_schedule: StudentCourseSelection.txt
  # MyEd internal attendance-only sections — not real classes.
  excluded_course_codes:
    - ATT--AM
    - ATT--PM
  # ~386 SD60 students are Active at TWO schools (identical demographics except
  # School Number; same admission date; no withdraw date; DISJOINT classes at
  # each school). Collapse to one Students row per User ID, keeping the
  # home-school row; class enrolments at BOTH schools are preserved (Enrollments
  # match by User ID). Opt-in — off for every other district.
  #
  # NOTE: because `SchoolCode` now maps to "Home school number" (below), the
  # collapse's home-row priority is uniformly 0 (School == Home for every row),
  # so it degenerates to keep-FIRST-row-per-User-ID. Deterministic on the current
  # extract: on the real 2026-07-14 data all 386 cross-enrolled students have
  # IDENTICAL admission-year AND homeroom across their rows, and the fully-generated
  # email (legal names + admission-year) is identical under first-vs-home selection
  # → 0 differing emails. Other kept-row output fields were NOT exhaustively diffed;
  # the collapse dedupes to one row per User ID regardless. A future extract with
  # cross-row variance would warrant an explicit `cross_enrollment.school_column`
  # — not built (YAGNI).
  cross_enrollment:
    collapse: true
    home_school_column: "Home school number"

mappings:
  Students:
    source_files:
      student_demographic: Student_demo_enh.txt
    field_map:
      # EnrollStatus override REMOVED — inherit base default ["Active","PreReg"],
      # dropping the 37 "Active No Primary" (online-course-only attachments).
      # Roster every student under their home school (was per-row School Number).
      "SchoolCode": "Home school number"
      # Generate a deterministic learn60 login for every active student:
      #   firstlast + 2-digit admission year @learn60.ca
      # sanitize → strip apostrophes/hyphens/spaces from names to [a-z0-9];
      # derived_dates → 2-digit year derived from the "Admission date" column
      # (blank/unparseable admission date → no suffix, never a garbage suffix).
      "Email Address":
        format: "{legal first name}{legal surname}{admission yy}@learn60.ca"
        sanitize: true
        derived_dates:
          "admission yy":
            column: "Admission date"
            date_format: "yy"

  Staff:
    source_files:
      staff_info: StaffInformation.txt

  Family:
    source_files:
      emergency_contacts: EmergencyEnhanced.txt
    # Only true parents/guardians become SpacesEDU family accounts (exclude
    # non-guardian emergency contacts: grandparents, friends, etc.).
    row_filters:
      - column: "Parent Auth / Guardian"
        include: ["Y"]

  Classes:
    source_files:
      student_schedule: StudentCourseSelection.txt
      course_info: CourseInformation.txt
      staff_info: StaffInformation.txt
      student_demographic: Student_demo_enh.txt
      class_info: ClassInformation.txt
    field_map:
      # SD60 schedule has no Primary-Teacher flag; title col is "Title"; section
      # comes from the schedule's "Section" (not "Section Letter").
      "Name":
        "primary teacher flag": ""
        "teacher last name": "Teacher Name"
        "course title": "Title"
        "section letter": "Section"

  Enrollments:
    source_files:
      student_schedule: StudentCourseSelection.txt
      student_demographic: Student_demo_enh.txt
    field_map:
      "User ID":
        "student_id_col": "Student Number"
        "staff_id_col": "Teacher ID"
      "Role":
        "student_id_col": "Student Number"
        "staff_id_col": "Teacher ID"
