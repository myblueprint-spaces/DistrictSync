site_name: GDE2Acsv
site_description: MyEducation BC GDE to SpacesEDU Advanced CSV converter — by SpacesEDU by myBlueprint
site_author: SpacesEDU by myBlueprint
site_url: https://myblueprint.github.io/GDE2Acsv/
repo_url: https://github.com/myblueprint/GDE2Acsv
repo_name: myblueprint/GDE2Acsv
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  logo: assets/spacesedu-icon.png
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - assets/brand.css

plugins:
  - search
  # Uncomment when mkdocs-with-pdf is installed:
  # - with-pdf:
  #     author: SpacesEDU by myBlueprint
  #     cover_title: GDE2Acsv
  #     cover_subtitle: Partner Installation & Developer Guide
  #     output_path: pdf/GDE2Acsv-docs.pdf

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Partner Guide:
    - Installation: partner/installation.md
    - Headless & Docker SFTP Setup: partner/headless-sftp-setup.md
    - How Classes Work: partner/how-classes-work.md
    - Troubleshooting: partner/troubleshooting.md
    - FAQ: partner/faq.md
  - Developer Guide:
    - Setup: developer/setup.md
    - Architecture: developer/architecture.md
    - Adding a Transformer: developer/adding-transformer.md
    - Adding a District Config: developer/adding-district.md
    - Testing: developer/testing.md
    - Release Process: developer/release.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/myblueprint/GDE2Acsv
      name: GDE2Acsv on GitHub
  generator: false

copyright: >
  © 2026 myBlueprint Corp. &nbsp;·&nbsp;
  <a href="https://myblueprint.ca/privacy">Privacy</a>
