name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.13
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install paramiko keyring  # optional SFTP deps (needed by sftp/scheduler modules)

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/

      - name: Type-check with mypy
        run: mypy src/ --exclude 'src/ui_flet'

      - name: Security scan with bandit
        run: bandit -r src/ -q -c pyproject.toml

      - name: Run tests with coverage
        run: python -m pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=80

      - name: Validate all mapping configs
        run: |
          python -c "
          from src.config.loader import load_config
          for name in ['myedbc', 'sd40myedbc', 'sd48myedbc', 'sd51myedbc', 'sd54myedbc', 'sd60myedbc', 'sd74myedbc']:
              load_config(name)
              print(f'{name}: OK')
          "
