name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/ --cov=src --cov-fail-under=80

  # -----------------------------------------------------------------------
  # THE public exe — windowed/no-console/offline Flet-default onefile built +
  # smoked on Win+Linux+macOS via the reusable matrix. Packs src/main.py: no
  # args → the Flet shell; --sis/--input/--output → the CLI. One exe per OS.
  # -----------------------------------------------------------------------

  build-flet:
    needs: test
    uses: ./.github/workflows/flet-pack.yml

  # -----------------------------------------------------------------------
  # Publish release — attach the Flet-default exe (1/OS) + SHA-256 checksums.
  # The download `name:` values MUST byte-match flet-pack.yml's upload names
  # (DistrictSync-<matrix.os>): windows-latest / ubuntu-22.04 / macos-latest.
  # -----------------------------------------------------------------------

  publish-release:
    needs: [build-flet]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: DistrictSync-windows-latest
          path: artifacts/windows
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: DistrictSync-ubuntu-22.04
          path: artifacts/linux
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: DistrictSync-macos-latest
          path: artifacts/macos

      - name: Rename and mark executables
        run: |
          mv artifacts/windows/DistrictSync.exe artifacts/DistrictSync-windows.exe
          mv artifacts/linux/DistrictSync       artifacts/DistrictSync-linux
          mv artifacts/macos/DistrictSync       artifacts/DistrictSync-macos
          chmod +x artifacts/DistrictSync-linux artifacts/DistrictSync-macos

      # Integrity anchor (RC9): SHA-256 of every released binary, attached to the
      # Release so a downloader can verify. Interim until code-signing (PLAT-4).
      - name: Compute SHA-256 checksums
        run: |
          cd artifacts
          sha256sum DistrictSync-windows.exe DistrictSync-linux DistrictSync-macos > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          body: |
            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `DistrictSync-windows.exe` | Double-click to open the app, or run with `--sis`/`--input`/`--output` args for CLI use |
            | Linux   | `DistrictSync-linux`       | `chmod +x` before first run |
            | macOS   | `DistrictSync-macos`       | Allow in System Settings > Privacy & Security |

            Verify your download against `SHA256SUMS.txt` (e.g. `sha256sum -c SHA256SUMS.txt`). These binaries are not yet code-signed.

            See the [SpacesEDU Help Centre article](https://help.spacesedu.com/en-ca/article/mx56qo) for setup basics.
          files: |
            artifacts/DistrictSync-windows.exe
            artifacts/DistrictSync-linux
            artifacts/DistrictSync-macos
            artifacts/SHA256SUMS.txt
